<head>

    <title>ReadQuest - Knowledge Check</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        :root {
            --teal: #0d9488;
            --white: #ffffff;
            --border: #e2e8f0;
            --bg-light: #f1f5f9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-light);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .quiz-container {
            background: var(--white);
            width: 100%;
            max-width: 600px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-top: 5px solid var(--teal);
            text-align: center;
        }

        .quiz-logo {
            height: 50px;
            margin-bottom: 15px;
        }

        h1 {
            color: var(--teal);
            font-size: 1.3rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .page-indicator {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        #question-text {
            font-size: 1rem;
            color: #334155;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: var(--white);
            color: var(--teal);
            border: 2px solid var(--teal);
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-size: 0.9rem;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        .option-btn:hover {
            background: var(--teal);
            color: var(--white);
        }

        .option-btn.correct {
            background: #22c55e !important;
            border-color: #22c55e !important;
            color: white !important;
        }

        .option-btn.wrong {
            background: #ef4444 !important;
            border-color: #ef4444 !important;
            color: white !important;
        }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
            font-size: 0.95rem;
        }

        .btn-large {
            background: var(--teal);
            color: var(--white);
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            display: none;
            margin: 0 auto;
            min-height: 44px;
        }

        .btn-large:active {
            opacity: 0.8;
        }

        /* Tablet (768px and up) */
        @media (min-width: 768px) {
            .quiz-container {
                padding: 30px;
            }

            h1 {
                font-size: 1.5rem;
            }

            #question-text {
                font-size: 1.1rem;
            }

            .option-btn {
                padding: 15px;
                font-size: 0.95rem;
            }

            .btn-large {
                padding: 15px 40px;
                font-size: 1rem;
            }
        }

        /* Desktop (1024px and up) */
        @media (min-width: 1024px) {
            .quiz-container {
                padding: 40px;
            }

            h1 {
                font-size: 1.5rem;
            }

            #question-text {
                font-size: 1.15rem;
            }

            .option-btn {
                padding: 15px;
                font-size: 1rem;
            }

            .btn-large {
                padding: 15px 40px;
                font-size: 1rem;
            }
        }

        /* Landscape orientation optimization */
        @media (max-height: 600px) {
            body {
                padding: 5px;
            }

            .quiz-container {
                padding: 15px;
            }

            .quiz-logo {
                height: 40px;
                margin-bottom: 10px;
            }

            h1 {
                font-size: 1.1rem;
                margin-bottom: 5px;
            }

            #question-text {
                font-size: 0.9rem;
                margin-bottom: 10px;
            }

            .options-list {
                gap: 8px;
                margin-bottom: 10px;
            }

            .option-btn {
                padding: 8px;
                font-size: 0.85rem;
                min-height: 40px;
            }
        }
    </style>
</head>

        function loadQuestion() {
            const bookQuestions = quizData[bID];
            if (!bookQuestions || bookQuestions.length === 0) {
                // Clarify that this book simply has no quiz entries defined yet
                document.getElementById('question-text').innerText = "No questions are available for this book at the moment.";
                document.getElementById('feedback').innerText = "You can continue reading or return to the library.";
                document.getElementById('feedback').style.color = "#64748b";
                document.getElementById('return-btn').style.display = "block";
                console.warn(`Quiz data missing for book ID ${bID}`);
                return;
            }

            // Find matching question by trigger page (page that triggered the checkpoint)
            const matchingQuestion = bookQuestions.find(q => q.page === triggerPage);
            const questionData = matchingQuestion || bookQuestions[0];

            document.getElementById('question-text').innerText = questionData.question;
            document.getElementById('page-indicator').innerText = `Page ${questionData.page} • ${questionData.type}`;
            
            const container = document.getElementById('options-container');
            questionData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, questionData.correct, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct, btn) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            if (selected === correct) {
                btn.classList.add('correct');
                document.getElementById('feedback').innerText = "Correct! Well done, Explorer.";
                document.getElementById('feedback').style.color = "#22c55e";
            } else {
                btn.classList.add('wrong');
                if (typeof correct === 'number') {
                    allBtns[correct].classList.add('correct');
                }
                document.getElementById('feedback').innerText = "Not quite. Review the last few pages!";
                document.getElementById('feedback').style.color = "#ef4444";
            }

            document.getElementById('return-btn').style.display = "block";
        }

        function returnToBook() {
            window.location.href = `../game.html?id=${bID}`;
        }

        window.onload = loadQuestion;
    </script>
